<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulateur Bootstrap pour oTree</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* Styles personnalisés pour la démo */
        body {
            background-color: #f4f6f9; /* Couleur de fond classique des interfaces admin/oTree */
        }
        .demo-container {
            margin-top: 20px;
        }
        .control-panel {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .otree-preview-window {
            background: white;
            border: 2px dashed #adb5bd;
            border-radius: 8px;
            padding: 20px;
            min-height: 400px;
        }
        .preview-header {
            font-family: monospace;
            color: #6c757d;
            margin-bottom: 15px;
            border-bottom: 1px solid #dee2e6;
            padding-bottom: 5px;
        }
        /* Pour bien visualiser les colonnes de la grille */
        .grid-visualizer {
            border: 1px solid rgba(13, 110, 253, 0.2);
            background-color: rgba(13, 110, 253, 0.05);
            padding-top: 15px;
            padding-bottom: 15px;
            border-radius: 5px;
            transition: all 0.3s ease; /* Animation fluide lors du changement de taille */
        }
    </style>
</head>
<body>

<div class="container-fluid demo-container">
    <div class="row">
        
        <div class="col-md-3">
            <div class="control-panel">
                <h4 class="mb-4">🛠️ Panneau de contrôle</h4>
                
                <div class="mb-4">
                    <label for="gridSlider" class="form-label fw-bold">1. Système de Grille (col-md-X)</label>
                    <input type="range" class="form-range" min="2" max="10" step="1" id="gridSlider" value="7">
                    <div class="d-flex justify-content-between text-muted small">
                        <span id="leftColLabel">col-md-7</span>
                        <span id="rightColLabel">col-md-5</span>
                    </div>
                </div>

                <hr>

                <div class="mb-4">
                    <label class="form-label fw-bold">2. Structure de la Card</label>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="checkHeader" checked>
                        <label class="form-check-label" for="checkHeader">Afficher le Header</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="checkFooter">
                        <label class="form-check-label" for="checkFooter">Afficher le Footer</label>
                    </div>
                </div>

                <hr>

                <div class="mb-3">
                    <label for="btnTheme" class="form-label fw-bold">3. Thème du Bouton</label>
                    <select class="form-select" id="btnTheme">
                        <option value="btn-primary">Primary (Bleu)</option>
                        <option value="btn-success">Success (Vert)</option>
                        <option value="btn-danger">Danger (Rouge)</option>
                        <option value="btn-warning">Warning (Jaune)</option>
                        <option value="btn-outline-primary">Outline Primary (Contour)</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="col-md-9">
            <div class="otree-preview-window">
                <div class="preview-header">
                    👁️ Aperçu de la page oTree (Live)
                </div>
                
                <div class="row" id="previewRow">
                    
                    <div class="col-md-7 grid-visualizer" id="leftCol">
                        <div class="card shadow-sm">
                            <div class="card-header bg-light" id="cardHeader">
                                <h5 class="mb-0">Instructions du jeu</h5>
                            </div>
                            <div class="card-body">
                                <p class="card-text">Bienvenue dans cette session. Vous disposez d'une dotation initiale de <strong>100 points</strong>.</p>
                                <p class="card-text text-muted small">Veuillez prendre votre décision dans le panneau de droite.</p>
                            </div>
                            <div class="card-footer text-muted d-none" id="cardFooter">
                                Période 1 sur 10
                            </div>
                        </div>
                    </div>

                    <div class="col-md-5 grid-visualizer text-center" id="rightCol">
                        <div class="p-4 border rounded bg-white shadow-sm h-100 d-flex flex-column justify-content-center">
                            <h5>Votre Décision</h5>
                            <div class="input-group mb-3 mt-3">
                                <span class="input-group-text">Contribution</span>
                                <input type="number" class="form-control" placeholder="0 - 100">
                            </div>
                            <button class="btn btn-primary btn-lg mt-2" id="actionBtn">Soumettre</button>
                        </div>
                    </div>

                </div>
            </div>
        </div>

    </div>
</div>

<script>
    // Attendre que le DOM soit chargé (comme expliqué dans votre cours !)
    document.addEventListener("DOMContentLoaded", function() {
        
        // 1. Logique du système de grille
        const gridSlider = document.getElementById("gridSlider");
        const leftCol = document.getElementById("leftCol");
        const rightCol = document.getElementById("rightCol");
        const leftColLabel = document.getElementById("leftColLabel");
        const rightColLabel = document.getElementById("rightColLabel");

        gridSlider.addEventListener("input", function() {
            let leftWidth = parseInt(this.value);
            let rightWidth = 12 - leftWidth;

            // Mise à jour des classes CSS Bootstrap
            leftCol.className = `col-md-${leftWidth} grid-visualizer`;
            rightCol.className = `col-md-${rightWidth} grid-visualizer text-center`;

            // Mise à jour des étiquettes textuelles
            leftColLabel.innerText = `col-md-${leftWidth}`;
            rightColLabel.innerText = `col-md-${rightWidth}`;
        });

        // 2. Logique d'affichage de la Card (Header/Footer)
        const checkHeader = document.getElementById("checkHeader");
        const checkFooter = document.getElementById("checkFooter");
        const cardHeader = document.getElementById("cardHeader");
        const cardFooter = document.getElementById("cardFooter");

        checkHeader.addEventListener("change", function() {
            // Utilisation des classes utilitaires Bootstrap (d-none = display: none)
            if(this.checked) {
                cardHeader.classList.remove("d-none");
            } else {
                cardHeader.classList.add("d-none");
            }
        });

        checkFooter.addEventListener("change", function() {
            if(this.checked) {
                cardFooter.classList.remove("d-none");
            } else {
                cardFooter.classList.add("d-none");
            }
        });

        // 3. Logique du thème du bouton
        const btnTheme = document.getElementById("btnTheme");
        const actionBtn = document.getElementById("actionBtn");

        btnTheme.addEventListener("change", function() {
            // On supprime toutes les classes de couleur possibles pour nettoyer
            actionBtn.classList.remove("btn-primary", "btn-success", "btn-danger", "btn-warning", "btn-outline-primary");
            // On ajoute la classe sélectionnée dans le menu déroulant
            actionBtn.classList.add(this.value);
        });

    });
</script>

</body>
</html>
